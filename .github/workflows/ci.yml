name: ci
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt pytest ruff mypy bandit
      - run: ruff check .
      - run: mypy app || true
      - run: bandit -q -r app || true
      - run: pytest -q
